services:
  kagura:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      KAGURA_REVIEW_PANEL_HOST: 0.0.0.0
      KAGURA_REVIEW_PANEL_BASE_URL: ${KAGURA_REVIEW_PANEL_BASE_URL:-http://127.0.0.1:3077}
    ports:
      - '${KAGURA_REVIEW_PANEL_HOST_PORT:-3077}:${KAGURA_REVIEW_PANEL_PORT:-3077}'
    user: '${HOST_UID_GID:-app}'
    restart: unless-stopped
    volumes:
      - type: bind
        source: ${HOST_REPO_ROOT:?set HOST_REPO_ROOT in .env}
        target: /workspace
      - type: volume
        source: slack_cc_bot_data
        target: /app/data

volumes:
  slack_cc_bot_data: {}
